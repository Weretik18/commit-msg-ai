line-length = 100
target-version = "py39"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long (handled by line-length)
    "B008",  # function call in default argument
]

[lint.per-file-ignores]
"tests/*" = ["E402"]
